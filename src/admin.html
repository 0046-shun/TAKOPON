<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TAKOPON Admin</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="admin-body">
    <main class="admin">
      <header class="admin-header">
        <img src="../img/file.svg" alt="TAKOPON logo" class="logo admin-logo" />
        <div>
          <h1>Admin</h1>
          <p class="muted">Basic認証でアクセス制御します。</p>
        </div>
      </header>

      <section class="admin-section">
        <div class="section-head">
          <h2>出店情報</h2>
          <button type="button" class="admin-btn">新規作成</button>
        </div>
        <div class="admin-list">
          <article class="admin-card">
            <div>
              <h3>港公園マーケット</h3>
              <p>2026.03.10 - 2026.03.12</p>
              <p class="muted">東京都港区〇〇 1-2-3</p>
            </div>
            <div class="admin-actions">
              <button type="button" class="admin-btn">編集</button>
              <button type="button" class="admin-btn admin-btn--ghost">削除</button>
            </div>
          </article>
          <article class="admin-card">
            <div>
              <h3>リバーサイドフェス</h3>
              <p>2026.03.20 - 2026.03.21</p>
              <p class="muted">大阪府大阪市〇〇 4-5-6</p>
            </div>
            <div class="admin-actions">
              <button type="button" class="admin-btn">編集</button>
              <button type="button" class="admin-btn admin-btn--ghost">削除</button>
            </div>
          </article>
        </div>

        <form class="admin-form">
          <div class="form-row">
            <label>
              期間（開始日）
              <input type="date" />
            </label>
            <label>
              期間（終了日）
              <input type="date" />
            </label>
          </div>
          <label>
            住所
            <input type="text" placeholder="東京都港区..." />
          </label>
          <label>
            Googleマップ埋め込みURL
            <input type="text" placeholder="https://www.google.com/maps?..." />
          </label>
          <label>
            備考
            <textarea rows="3" placeholder="雨天時の注意など"></textarea>
          </label>
          <label>
            出店写真（任意）
            <input type="file" />
          </label>
          <div class="form-row">
            <label>
              公開状態
              <select>
                <option>下書き</option>
                <option>公開</option>
              </select>
            </label>
            <label>
              公開予約（開始日時）
              <input type="datetime-local" />
            </label>
          </div>
          <button type="button" class="admin-btn">保存</button>
        </form>
      </section>

      <section class="admin-section">
        <div class="section-head">
          <h2>お知らせ</h2>
          <button type="button" class="admin-btn">新規作成</button>
        </div>
        <div class="admin-list">
          <article class="admin-card">
            <div>
              <h3>春の限定メニューが登場</h3>
              <p>2026.03.01</p>
              <p class="muted">https://example.com</p>
            </div>
            <div class="admin-actions">
              <button type="button" class="admin-btn">編集</button>
              <button type="button" class="admin-btn admin-btn--ghost">削除</button>
            </div>
          </article>
        </div>

        <form class="admin-form">
          <label>
            タイトル
            <input type="text" />
          </label>
          <label>
            本文
            <textarea rows="3"></textarea>
          </label>
          <div class="form-row">
            <label>
              日付
              <input type="date" />
            </label>
            <label>
              公開期間（開始）
              <input type="datetime-local" />
            </label>
            <label>
              公開期間（終了）
              <input type="datetime-local" />
            </label>
          </div>
          <label>
            リンク（外部URL）
            <input type="url" placeholder="https://..." />
          </label>
          <button type="button" class="admin-btn">保存</button>
        </form>
      </section>
    </main>
  </body>
</html>
